<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Subtle Product Manager App Icon</title>
  <desc id="desc">A minimal vector icon representing product management with a central roadmap card, prioritization lanes, and soft connected strategy nodes.</desc>
  <defs>
    <linearGradient id="primary" x1="260" y1="240" x2="760" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>

    <linearGradient id="accent" x1="340" y1="330" x2="720" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <circle cx="512" cy="512" r="300" fill="none" stroke="#0F766E" stroke-opacity="0.12" stroke-width="28"/>
  <path d="M512 212A300 300 0 0 1 812 512" fill="none" stroke="url(#primary)" stroke-width="28" stroke-linecap="round" opacity="0.34"/>
  <path d="M512 812A300 300 0 0 1 212 512" fill="none" stroke="url(#primary)" stroke-width="28" stroke-linecap="round" opacity="0.24"/>

  <circle cx="512" cy="212" r="34" fill="#E6FFFB" stroke="#14B8A6" stroke-width="12"/>
  <circle cx="812" cy="512" r="34" fill="#EFF6FF" stroke="#2563EB" stroke-width="12"/>
  <circle cx="512" cy="812" r="34" fill="#F5F3FF" stroke="#7C3AED" stroke-width="12"/>
  <circle cx="212" cy="512" r="34" fill="#FFF7ED" stroke="#F59E0B" stroke-width="12"/>

  <g filter="url(#softShadow)">
    <rect x="304" y="314" width="416" height="396" rx="72" fill="#FFFFFF"/>
    <rect x="304" y="314" width="416" height="396" rx="72" fill="url(#accent)" opacity="0.035"/>
  </g>

  <g stroke-linecap="round" stroke-width="24">
    <path d="M392 420H604" stroke="#CBD5E1"/>
    <path d="M392 512H560" stroke="#CBD5E1"/>
    <path d="M392 604H640" stroke="#CBD5E1"/>
  </g>

  <circle cx="360" cy="420" r="14" fill="#14B8A6"/>
  <circle cx="360" cy="512" r="14" fill="#2563EB"/>
  <circle cx="360" cy="604" r="14" fill="#F59E0B"/>

  <circle cx="642" cy="512" r="66" fill="url(#primary)"/>
  <path d="M610 512L633 535L681 486" fill="none" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M694 394L734 392L728 432" fill="none" stroke="#14B8A6" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>
