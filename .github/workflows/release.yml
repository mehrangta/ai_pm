name: Build release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build executable
        run: bun tauri build --no-bundle

      - name: Prepare release asset
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -LiteralPath src-tauri\target\release\app.exe -Destination "release\AI-PM-windows-x64-$shortSha.exe"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: AI PM ${{ github.sha }}
          target_commitish: ${{ github.sha }}
          files: release/*.exe
          body: |
            Automated Windows executable build for commit ${{ github.sha }}.
